        const Hero = () => {
            const [scrollY, setScrollY] = React.useState(0);
            const [isDesktop, setIsDesktop] = React.useState(false);
            const isDesktopRef = React.useRef(false);
            const [currentSlide, setCurrentSlide] = React.useState(0);

            React.useEffect(() => {
                const handleResize = () => {
                    const isD = window.innerWidth >= 1024;
                    setIsDesktop(isD);
                    isDesktopRef.current = isD;
                };

                const handleScroll = () => {
                    setScrollY(window.pageYOffset);
                };

                handleResize();
                const slideInterval = setInterval(() => {
                    setCurrentSlide(prev => (prev === 0 ? 1 : 0));
                }, 5000);

                window.addEventListener('resize', handleResize);
                window.addEventListener('scroll', handleScroll, { passive: true });
                
                return () => {
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('scroll', handleScroll);
                    clearInterval(slideInterval);
                };
            }, []);

            const slides = [
                'https://rafaelsans.com.br/assets/images/heros/01.webp',

        const ProjectCard = ({ project, index, isCarousel = false }) => {
            const [isPlaying, setIsPlaying] = React.useState(false);
            const [origin, setOrigin] = React.useState('');
            const isLCP = !isCarousel && index === 0;

            React.useEffect(() => {
                setOrigin(window.location.origin);
            }, []);

            const imageUrl = project.youtubeId 
                ? `https://img.youtube.com/vi/${project.youtubeId}/maxresdefault.jpg`
                : project.image;

            const handleInteraction = () => {
                if (project.youtubeId && !isPlaying) {
                    setIsPlaying(true);
                }
            };

            const getContainerClasses = () => {
                let base = 'project-card group relative overflow-hidden cursor-zoom-in bg-black rounded-lg border border-white/10 ';
                if (isCarousel) {
                    return base + 'w-full aspect-[9/16]'; 
                }
                switch(project.layout) {
                    case 'FULL': return base + 'w-full h-auto';
                    case 'HALF': return base + 'w-full h-auto'; 
                    case 'QUARTER': return base + 'w-full aspect-[9/16]'; 
                    default: return base + 'w-full h-auto';
                }
            };

            const videoUrl = project.youtubeId 
                ? `https://www.youtube-nocookie.com/embed/${project.youtubeId}?autoplay=1&mute=1&rel=0&modestbranding=1&controls=1&enablejsapi=1&origin=${encodeURIComponent(origin)}`
                : '';

            return (
                <div onClick={handleInteraction} className={getContainerClasses()}>
                    <div className="relative w-full h-full">
                        {!isPlaying ? (
                            <div className="w-full h-full relative">
                                <img
                                    src={imageUrl}
                                    alt={project.title}
                                    loading={isLCP ? 'eager' : 'lazy'}
                                    className={`project-image w-full block transition-all duration-700 ease-out group-hover:scale-105 ${project.layout === 'QUARTER' || isCarousel ? 'h-full object-cover' : 'h-auto'}`}
                                    fetchPriority={isLCP ? "high" : undefined}
                                    onError={(e) => {
                                        if (project.youtubeId && e.target.src.includes('maxresdefault')) {
                                            e.target.src = `https://img.youtube.com/vi/${project.youtubeId}/hqdefault.jpg`;
                                        }
                                    }}
                                />

                                {project.youtubeId && (
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:scale-110 transition-transform duration-500 z-10">
                                        <div className="w-10 h-10 md:w-14 md:h-14 bg-accent/90 rounded-full flex items-center justify-center pl-1 shadow-[0_0_20px_rgba(52,152,219,0.5)] backdrop-blur-md border border-white/20">
                                            <svg className="w-5 h-5 md:w-7 md:h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                <path d="M8 5v14l11-7z" />
                                            </svg>
                                        </div>
                                    </div>
                                )}

                                <div className="absolute bottom-3 left-3 md:bottom-4 md:left-4 z-20 flex flex-row items-center gap-1.5 md:gap-2 pointer-events-none">
                                    <div className="bg-black/80 backdrop-blur-lg px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-white/10 shadow-2xl">
                                        <h3 className="text-white font-bold text-[8px] md:text-[10px] tracking-tight whitespace-nowrap uppercase">{project.title}</h3>
                                    </div>
                                    <div className="bg-accent px-3 py-1.5 md:px-4 md:py-2 rounded-full shadow-2xl">
                                        <p className="text-white font-black text-[6px] md:text-[8px] uppercase tracking-[0.2em] whitespace-nowrap">{project.category}</p>
                                    </div>
                                </div>
                                
                                <div className="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                            </div>
                        ) : (
                            <div className="absolute inset-0 w-full h-full z-30 animate-in fade-in duration-500 bg-black">
                                <iframe
                                    src={videoUrl}
                                    title={project.title}
                                    className="w-full h-full border-0"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                    allowFullScreen
                                ></iframe>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const VideoCarousel = ({ items }) => {
            const swiperRef = React.useRef(null);

            React.useEffect(() => {
                const swiperContainer = swiperRef.current;
                if (!swiperContainer) return;

                const params = {
                    slidesPerView: 1.2,
                    spaceBetween: 10,
                    loop: true,
                    navigation: false,
                    autoplay: {
                        delay: 10000,
                        disableOnInteraction: false,
                        pauseOnMouseEnter: true
                    },
                    breakpoints: {
                        640: {
                            slidesPerView: 2.2,
                            spaceBetween: 15,
                        },
                        1024: {
                            slidesPerView: 4,
                            spaceBetween: 24,
                        },
                    },
                    injectStyles: [
                        `
                        .swiper {
                            padding: 0;
                            width: 100%;
                            height: 100%;
                        }
                        .swiper-slide {
                            height: auto;
                            display: flex;
                            align-items: stretch;
                        }
                        `
                    ],
                };

                Object.assign(swiperContainer, params);
                swiperContainer.initialize();
            }, []);

            const handlePrev = () => {
                swiperRef.current?.swiper?.slidePrev();
            };

            const handleNext = () => {
                swiperRef.current?.swiper?.slideNext();
            };

            return (
                <div className="w-full flex items-stretch justify-center h-auto">
                    <div 
                        onClick={handlePrev}
                        className="hidden lg:flex w-[80px] bg-accent items-center justify-center cursor-pointer hover:bg-[#2980b9] transition-colors duration-300 z-10 flex-shrink-0 mr-6 rounded-lg"
                    >
                        <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" />
                        </svg>
                    </div>

                    <div className="flex-1 w-full min-w-0 bg-black overflow-hidden relative">
                        <swiper-container ref={swiperRef} init="false">
                            {items.map((item, index) => (
                                <swiper-slide key={item.id}>
                                    <ProjectCard project={item} index={index} isCarousel={true} />
                                </swiper-slide>
                            ))}
                        </swiper-container>
                    </div>

                    <div 
                        onClick={handleNext}
                        className="hidden lg:flex w-[80px] bg-accent items-center justify-center cursor-pointer hover:bg-[#2980b9] transition-colors duration-300 z-10 flex-shrink-0 ml-6 rounded-lg"
                    >
                        <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                </div>
            );
        };

        const ProjectGrid = () => {
            const renderStaticSlice = (projects) => {
                const rows = [];
                let i = 0;
                while (i < projects.length) {
                    const current = projects[i];
                    if (current.layout === 'FULL') {
                        rows.push(<div key={`row-${current.id}`} className="grid grid-cols-1 gap-6"><ProjectCard project={current} index={i} /></div>);
                        i++;
                    } else if (current.layout === 'HALF') {
                        if (i + 1 < projects.length && projects[i+1].layout === 'HALF') {
                             const items = projects.slice(i, i + 2);
                             rows.push(<div key={`row-${current.id}`} className="grid grid-cols-1 md:grid-cols-2 gap-6">{items.map((item, idx) => (<ProjectCard key={item.id} project={item} index={i + idx} />))}</div>);
                             i += 2;
                        } else {
                            rows.push(<div key={`row-${current.id}`} className="grid grid-cols-1 gap-6"><ProjectCard project={current} index={i} /></div>);
                            i++;
                        }
                    } else {
                        rows.push(<div key={`row-${current.id}`} className="grid grid-cols-1 gap-6"><ProjectCard project={current} index={i} /></div>);
                        i++;
                    }
                }
                return rows;
            };

            const section1 = STATIC_PROJECTS.filter(p => ['01','02','03','04','05','06','07','08'].includes(p.id));
            const section2 = STATIC_PROJECTS.filter(p => ['09','10','11','12','13'].includes(p.id));
            const section3 = STATIC_PROJECTS.filter(p => !['01','02','03','04','05','06','07','08','09','10','11','12','13'].includes(p.id));

            return (
                <section id="portfolio" className="py-8 bg-black">
                    <div className="max-w-[1200px] mx-auto flex flex-col gap-6 px-6 xl:px-0">
                        {renderStaticSlice(section1)}
                        <VideoCarousel items={CAROUSEL_1_ITEMS} />
                        {renderStaticSlice(section2)}
                        <VideoCarousel items={CAROUSEL_2_ITEMS} />
                        {renderStaticSlice(section3)}
                    </div>
                </section>
            );
        };

        const SkillsBar = () => {
            return (
                <section className="w-full bg-white pt-16 pb-12">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="grid grid-cols-7 gap-y-8 gap-x-2 place-items-center md:flex md:flex-nowrap md:justify-center md:items-center md:gap-5">
                            {TOOLS.map((tech) => (
                                <div key={tech.name} className="group relative flex-shrink-0 flex items-center justify-center cursor-pointer" title={tech.name}>
                                    <img 
                                        src={tech.url} 
                                        alt={tech.name}
                                        loading="lazy"
                                        width="32"
                                        height="32" 
                                        className="w-8 h-8 object-contain filter grayscale opacity-40 transition-all duration-500 ease-in-out group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-110"
                                    />
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ContactForm = () => {
            const [formData, setFormData] = React.useState({ name: '', whatsapp: '', email: '', subject: '', message: '' });
            const [status, setStatus] = React.useState('IDLE');

            const handleWhatsAppChange = (e) => {
                let val = e.target.value.replace(/\D/g, "");
                if (val.length > 11) val = val.slice(0, 11);
                if (val.length > 10) {
                    val = `(${val.slice(0, 2)}) ${val.slice(2, 7)}-${val.slice(7)}`;
                } else if (val.length > 6) {
                    val = `(${val.slice(0, 2)}) ${val.slice(2, 6)}-${val.slice(6)}`;
                } else if (val.length > 2) {
                    val = `(${val.slice(0, 2)}) ${val.slice(2)}`;
                }
                setFormData({ ...formData, whatsapp: val });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('SENDING');
                const formspreeUrl = "https://formspree.io/f/xvgzpyzo"; 
                try {
                    const response = await fetch(formspreeUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...formData, _replyto: formData.email, _subject: `Novo Contato: ${formData.subject}` })
                    });
                    if (response.ok) {
                        setStatus('SUCCESS');
                        setFormData({ name: '', whatsapp: '', email: '', subject: '', message: '' });
                        setTimeout(() => setStatus('IDLE'), 5000);
                    } else {
                        setStatus('ERROR');
                        setTimeout(() => setStatus('IDLE'), 3000);
                    }
                } catch (error) {
                    setStatus('ERROR');
                    setTimeout(() => setStatus('IDLE'), 3000);
                }
            };

            const labelBase = "absolute left-0 top-6 text-neutral-400 uppercase tracking-widest text-[10px] font-black transition-all duration-300 pointer-events-none";
            const labelFloat = "peer-focus:-top-1 peer-focus:text-accent peer-focus:text-[10px] peer-[:not(:placeholder-shown)]:-top-1 peer-[:not(:placeholder-shown)]:text-accent peer-[:not(:placeholder-shown)]:text-[10px]";
            const inputBase = "w-full bg-transparent border-0 border-b border-neutral-300 py-3 pt-6 text-neutral-900 focus:border-accent focus:ring-0 outline-none transition-all duration-300 peer placeholder-transparent rounded-none px-0";

            return (
                <section id="contato" className="pt-4 pb-24 px-6 bg-white">
                    <div className="max-w-4xl mx-auto text-center mb-16">
                        <h2 className="text-3xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter leading-[1.1] text-neutral-800">
                            PRONTO PARA COLOCAR SUA <br className="hidden md:block" />
                            <span className="text-accent">MARCA EM MOVIMENTO?</span>
                        </h2>
                        <p className="text-neutral-500 mt-6 text-base md:text-lg font-medium tracking-tight max-w-xl mx-auto">
                            Preencha o formulário abaixo ou entre em contato direto pelo WhatsApp.
                        </p>
                    </div>

                    <div className="max-w-lg mx-auto">
                        <form onSubmit={handleSubmit} className="space-y-12 text-left">
                            <div className="grid grid-cols-1 gap-10">
                                <div className="relative group">
                                    <input id="name" name="name" required maxLength={80} type="text" className={inputBase} placeholder=" " value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                                    <label htmlFor="name" className={`${labelBase} ${labelFloat}`}>Nome <span className="text-red-500">*</span></label>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="relative group">
                                        <input 
                                          id="whatsapp" 
                                          name="whatsapp" 
                                          required 
                                          type="text" 
                                          className={inputBase} 
                                          placeholder=" " 
                                          value={formData.whatsapp} 
                                          onChange={handleWhatsAppChange}
                                          minLength={14} 
                                        />
                                        <label htmlFor="whatsapp" className={`${labelBase} ${labelFloat}`}>WhatsApp <span className="text-red-500">*</span></label>
                                    </div>
                                    <div className="relative group">
                                        <input id="email" name="email" type="email" maxLength={100} className={inputBase} placeholder=" " value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} />
                                        <label htmlFor="email" className={`${labelBase} ${labelFloat}`}>E-mail Profissional</label>
                                    </div>
                                </div>

                                <div className="relative group">
                                    <select id="subject" name="subject" required className="w-full bg-transparent border-0 border-b border-neutral-300 py-3 pt-6 text-neutral-900 focus:border-accent focus:ring-0 outline-none transition-all duration-300 peer appearance-none cursor-pointer px-0 rounded-none" value={formData.subject} onChange={(e) => setFormData({...formData, subject: e.target.value})}>
                                        <option value="" disabled>O que você precisa?</option>
                                        <option value="Motion Design">Motion Design</option>
                                        <option value="Identidade Visual / Branding">Identidade Visual / Branding</option>
                                        <option value="Social Media Design">Social Media Design</option>
                                        <option value="Design Digital / Web">Design Digital / Web</option>
                                        <option value="Outros">Outros</option>
                                    </select>
                                    <label htmlFor="subject" className="absolute left-0 -top-1 text-accent uppercase tracking-widest text-[10px] font-black">Tipo de Projeto <span className="text-red-500">*</span></label>
                                </div>

                                <div className="relative group">
                                    <textarea id="message" name="message" required maxLength={2000} className="w-full bg-transparent border-0 border-b border-neutral-300 py-3 pt-6 text-neutral-900 focus:border-accent focus:ring-0 outline-none transition-all duration-300 peer placeholder-transparent resize-none rounded-none px-0" placeholder=" " style={{ minHeight: '100px' }} value={formData.message} onChange={(e) => setFormData({...formData, message: e.target.value})} />
                                    <label htmlFor="message" className={`${labelBase} ${labelFloat}`}>Sobre o Projeto <span className="text-red-500">*</span></label>
                                    <div className="flex justify-end mt-2"><span className="text-[10px] text-neutral-400 font-bold uppercase tracking-widest">{formData.message.length} / 2000</span></div>
                                </div>
                            </div>

                            <button 
                                type="submit" 
                                disabled={status === 'SENDING'}
                                className="group relative w-full overflow-hidden bg-accent py-7 text-white font-black text-sm uppercase tracking-[0.5em] transition-all duration-300 hover:shadow-[0_20px_40px_rgba(52,152,219,0.3)] active:scale-[0.98] rounded-md disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-0 group-hover:gap-3 mt-8"
                            >
                                <span className="relative z-10 transition-all duration-300 whitespace-nowrap">
                                    {status === 'SENDING' ? 'ENVIANDO...' : status === 'SUCCESS' ? 'MENSAGEM ENVIADA' : status === 'ERROR' ? 'ERRO' : 'ENVIAR MENSAGEM'}
                                </span>
                                <div className="relative z-10 w-0 h-5 opacity-0 group-hover:w-5 group-hover:opacity-100 transition-all duration-300 overflow-hidden flex items-center justify-center">
                                    <svg className="w-5 h-5 rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                    </svg>
                                </div>
                                <div className="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                            </button>
                        </form>
                    </div>
                </section>
            );
        };

        const WhatsAppButton = () => (
            <a href="https://wa.me/5511973298152?text=Ol%C3%A1%20Rafa!%20Vi%20seu%20portf%C3%B3lio%20e%20gostaria%20de%20conversar%20sobre%20um%20projeto." target="_blank" rel="noopener noreferrer" className="relative z-50 bg-[#25D366] p-3 md:p-4 rounded-full shadow-2xl hover:scale-110 transition-transform active:scale-95 group">
                <svg className="w-6 h-6 md:w-8 md:h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
            </a>
        );

        const ScrollToTop = () => {
            return (
                <button 
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} 
                    className="relative z-50 p-3 md:p-4 rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-white shadow-2xl transition-all duration-700 hover:bg-accent hover:border-accent group"
                >
                    <svg className="w-6 h-6 md:w-8 md:h-8 transform transition-transform group-hover:-translate-y-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7" />
                    </svg>
                </button>
            );
        };

        const Footer = () => (
            <footer className="bg-[#000000] py-20 px-6 border-t border-white/5">
                <div className="max-w-7xl mx-auto flex flex-col items-center space-y-12">
                    <div className="text-3xl font-black tracking-tighter text-white">RAFAEL<span className="text-accent">SANS</span></div>
                    
                    <p className="text-white/90 text-center max-w-[600px] text-sm md:text-base leading-relaxed font-medium">
                        Sou o Rafa, designer estrategista focado em transformar criatividade em ferramenta de crescimento. Unindo Design Digital, Motion Graphics e Estratégia, desenvolvo soluções visuais que não apenas atraem atenção, mas movem marcas e impactam resultados reais para quem busca se destacar no mercado.
                    </p>

                    <div className="flex space-x-12 items-center">
                        <a href="https://www.instagram.com/rafaelsans.designer/" target="_blank" aria-label="Instagram" className="text-white hover:text-accent transition-all duration-300 transform hover:scale-125"><svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12s.015 3.667.072 4.947c.06 1.277.261 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24s3.667-.015 4.947-.072c1.277-.06 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.636.558-2.913.06-1.28.072-1.687.072-4.947s-.015-3.667-.072-4.947c-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 2.16c3.203 0 3.585.016 4.85.071 1.17.055 1.805.249 2.227.415.562.217.96.477 1.382.896.419.42.679.819.896 1.381.164.422.36 1.057.413 2.227.057 1.266.07 1.646.07 4.85s-.015 3.585-.074 4.85c-.061 1.17-.256 1.805-.421 2.227-.224.562-.479.96-.902 1.383-.419.419-.824.679-1.38.896-.42.164-1.065.36-2.235.413-1.274.057-1.649.07-4.859.07-3.211 0-3.586-.015-4.859-.074-1.171-.061-1.816-.256-2.236-.421-.569-.224-.96-.479-1.379-.902-.421-.419-.69-.824-.9-1.38-.165-.42-.359-1.065-.42-2.235-.045-1.26-.061-1.649-.061-4.844 0-3.196.016-3.586.061-4.861.061-1.17.255-1.814.42-2.234.21-.57.479-.96.9-1.381.419-.419.81-.689 1.379-.898.42-.166 1.051-.361 2.221-.415C8.403 2.176 8.797 2.16 12 2.16zm0 3.688c-3.402 0-6.162 2.76-6.162 6.162 0 3.402 2.76 6.162 6.162 6.162 3.402 0 6.162-2.76 6.162-6.162 0-3.402-2.76-6.162-6.162-6.162zM12 16c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm7.846-10.405c0 .795-.646 1.44-1.44 1.44-.795 0-1.44-.645-1.44-1.44 0-.794.645-1.439 1.44-1.439.793-.001 1.44.645 1.44 1.439z"/></svg></a>
                        <a href="https://www.facebook.com/rafaelsans" target="_blank" aria-label="Facebook" className="text-white hover:text-accent transition-all duration-300 transform hover:scale-125"><svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg></a>
                        <a href="https://www.linkedin.com/in/rafaelsans/" target="_blank" aria-label="LinkedIn" className="text-white hover:text-accent transition-all duration-300 transform hover:scale-125"><svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>
                    </div>
                    <div className="text-[10px] text-gray-500 uppercase tracking-[0.3em] font-bold">&copy; {new Date().getFullYear()} RafaelSans. Motion Design & Identidade Visual de Elite.</div>
                </div>
            </footer>
        );

        const App = () => {
            const [showFloating, setShowFloating] = React.useState(false);

            React.useEffect(() => {
                const handleScroll = () => {
                    const width = window.innerWidth;
                    const scroll = window.pageYOffset;

                    if (width >= 1024) {
                        setShowFloating(scroll > 1200);
                    } else {
                        setShowFloating(scroll > 400);
                    }
                };

                handleScroll();

                window.addEventListener('scroll', handleScroll, { passive: true });
                window.addEventListener('resize', handleScroll);
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('resize', handleScroll);
                };
            }, []);

            return (
                <div className="min-h-screen text-white selection:bg-accent selection:text-white font-sans">
                    <main className="antialiased">
                        <Hero />
                        <ProjectGrid />
                        <SkillsBar />
                        <ContactForm />
                        <Footer />
                    </main>
                    <div className={`fixed bottom-4 right-4 md:bottom-6 md:right-6 z-50 flex flex-row-reverse items-center gap-3 md:gap-4 transition-all duration-500 transform ${showFloating ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}>
                        <WhatsAppButton />
                        <ScrollToTop />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
